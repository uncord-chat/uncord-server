services:
  uncord:
    build: .
    ports:
      - "9800:9800"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      typesense:
        condition: service_healthy
    env_file: .env
    environment:
      DATA_DIR: /data/uncord/data
    volumes:
      - media_data:/data/uncord/media
      - ./data:/data/uncord/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9800/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: 1.0

  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: uncord
      POSTGRES_USER: uncord
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uncord"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 1g
    cpus: 1.0

  valkey:
    image: valkey/valkey:9.0-alpine3.23
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  typesense:
    image: typesense/typesense:30.1
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY} --listen-port 8108
    volumes:
      - typesense_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8108 && echo -e \"GET /collections HTTP/1.0\\r\\nHost: localhost\\r\\nX-TYPESENSE-API-KEY: ${TYPESENSE_API_KEY}\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q 200'"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25

  # Optional: Garage for S3 storage (uncomment when STORAGE_BACKEND=s3)
  # garage:
  #   image: dxflrs/garage:latest
  #   volumes:
  #     - garage_data:/var/lib/garage/data
  #     - garage_meta:/var/lib/garage/meta
  #   environment:
  #     GARAGE_ALLOW_WORLD_READABLE_SECRETS: "true"
  #   restart: unless-stopped

volumes:
  pg_data:
  valkey_data:
  typesense_data:
  media_data:
  # garage_data:
  # garage_meta:
